worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # Performance
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75;
    types_hash_max_size 2048;
    server_tokens      off;

    # Compression
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1000;
    gzip_comp_level 6;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # Upstream: API Gateway (stateless, round-robin)
    upstream api_backend {
        least_conn;
        server api-gateway:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # Upstream: Game Service (sticky for WebSocket)
    upstream game_backend {
        ip_hash;
        server game-service:3002 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    # Upstream: Admin Panel
    upstream admin_backend {
        server admin:3100;
    }

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.rummyroyale.com admin.rummyroyale.com;
        return 301 https://$host$request_uri;
    }

    # ── API Server ─────────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.rummyroyale.com;

        ssl_certificate     /etc/nginx/ssl/rummyroyale.crt;
        ssl_certificate_key /etc/nginx/ssl/rummyroyale.key;
        ssl_protocols       TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        client_max_body_size 10m;

        # REST API
        location /v1/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            proxy_send_timeout     30s;

            # Cache auth validation responses briefly
            proxy_cache_valid 200 1s;
        }

        # Auth endpoints — stricter rate limiting
        location /v1/auth/ {
            limit_req zone=auth burst=5 nodelay;

            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # WebSocket connections — sticky sessions to game service
        location /socket.io/ {
            limit_conn ws_conn 10;  # Max 10 WS per IP

            proxy_pass         http://game_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;
        }

        location /health {
            proxy_pass http://api_backend/health;
            access_log off;
        }
    }

    # ── Admin Server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.rummyroyale.com;

        ssl_certificate     /etc/nginx/ssl/rummyroyale.crt;
        ssl_certificate_key /etc/nginx/ssl/rummyroyale.key;
        ssl_protocols       TLSv1.3;

        # IP whitelist for admin (restrict to office IPs in production)
        # allow 203.0.113.0/24;
        # deny all;

        location / {
            proxy_pass         http://admin_backend;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }
    }
}
