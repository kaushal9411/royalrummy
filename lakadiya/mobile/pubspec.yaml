name: lakadiya
description: Lakadiya (Callbreak) — Real-time multiplayer card game
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Code generation
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  google_sign_in: ^6.2.1

  # Razorpay Payment Gateway
  razorpay_flutter: ^1.3.7

  # Audio
  audioplayers: ^6.0.0

  # OTP auto-read from SMS
  sms_autofill: ^2.3.0

  # Firebase — push notification delivery for OTP + crash reporting
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.6
  firebase_crashlytics: ^4.1.3
  flutter_local_notifications: ^17.1.1

  # WebView for privacy policy / legal pages
  webview_flutter: ^4.9.0

  # Image picker for KYC document upload
  image_picker: ^1.1.2

  # Receipt share + download
  share_plus: ^10.0.3
  path_provider: ^2.1.4


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/cards/
    - assets/sounds/
    - assets/legal/
