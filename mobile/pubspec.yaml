name: rummy_royale
description: RummyRoyale - Multiplayer Card Gaming Platform
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.10
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^13.2.0

  # HTTP & WebSocket
  dio: ^5.4.1
  socket_io_client: ^2.0.3+1
  connectivity_plus: ^5.0.2

  # Firebase
  firebase_core: ^2.27.1
  firebase_messaging: ^14.7.19
  firebase_analytics: ^10.8.9
  firebase_crashlytics: ^3.4.19
  firebase_remote_config: ^4.3.19
  firebase_dynamic_links: ^5.4.19

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0

  # UI
  flutter_local_notifications: ^16.3.0
  cached_network_image: ^3.3.1
  lottie: ^3.0.0
  shimmer: ^3.0.0
  fl_chart: ^0.67.0
  pinput: ^3.0.1

  # Payment
  razorpay_flutter: ^1.3.6

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  crypto: ^3.0.3
  package_info_plus: ^5.0.1
  device_info_plus: ^9.1.2
  permission_handler: ^11.3.0
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  image_picker: ^1.0.7
  local_auth: ^2.1.8

  # Ads & Analytics
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  custom_lint: ^0.6.2
  riverpod_lint: ^2.3.9
  flutter_lints: ^3.0.1
  mockito: ^5.4.4
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/cards/
    - assets/images/avatars/
    - assets/animations/
    - assets/sounds/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
